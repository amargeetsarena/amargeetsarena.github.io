<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Order delicious food online with pickup and delivery options">
  <title>Amargeet's Arena | Food Delivery</title>

  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://amargeetsarena.github.io/">
  <meta property="og:title" content="Amargeet's Arena | Food Delivery">
  <meta property="og:description" content="Order delicious food online with delivery options">
  <meta property="og:image" content="https://amargeetsarena.github.io/images/logo.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Amargeet's Arena — Food Delivery">
  <meta property="og:site_name" content="Amargeet's Arena">
  <meta property="og:locale" content="en_IN">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://amargeetsarena.github.io/">
  <meta property="twitter:title" content="Amargeet's Arena | Food Delivery">
  <meta property="twitter:description" content="Order delicious food online with delivery options">
  <meta property="twitter:image" content="https://amargeetsarena.github.io/images/logo.png">

  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="apple-touch-icon" href="images/logo.png">
  <meta name="theme-color" content="#ff6b35">

  <!-- Fonts (preconnect before stylesheet) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-left">
        <h1 class="site-title">
          <img src="images/logo.png" alt="Amargeet's Arena" class="site-logo">
          <span>Amargeet's Arena</span>
        </h1>
        <p class="site-subtitle">Only for GK Tropical Springs Apartment</p>
      </div>
      <div class="view-toggle">
        <button id="grid-view-btn" class="view-btn active" title="Grid View">
          <i class="fas fa-th-large"></i>
        </button>
        <button id="list-view-btn" class="view-btn" title="List View">
          <i class="fas fa-list"></i>
        </button>
      </div>
    </div>
  </header>

  <nav class="categories-nav">
    <button class="active" data-category="all"><i class="fas fa-pizza-slice"></i> All</button>
    <button data-category="veg"><i class="fas fa-leaf"></i> Veg</button>
    <button data-category="nonveg"><i class="fas fa-drumstick-bite"></i> Non-Veg</button>
    <button data-category="withoutoniongarlic"><i class="fas fa-bread-slice"></i> No Onion/Garlic</button>
  </nav>

  <main>
    <div id="menu-container"></div>
  </main>

  <button id="admin-fab" class="admin-fab" style="display:none" title="Manage Menu">
    <i class="fas fa-cog"></i>
  </button>

  <div id="admin-panel" class="admin-panel" style="display:none"></div>

  <button id="cart-fab" class="cart-fab" title="View Cart" aria-label="View Cart">
    <i class="fas fa-shopping-cart"></i>
    <span id="cart-badge" class="cart-badge" style="display:none">0</span>
  </button>

  <div id="cart-panel" class="cart-panel">
    <div class="cart-panel__header">
      <h2 class="cart-panel__title">My Cart</h2>
      <button type="button" class="cart-panel__close" id="cart-panel-close" aria-label="Close Cart">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="cart-panel__body">
      <div id="cart-items-container"></div>
      <div id="cart-checkout-container" style="display:none">
        <div class="cart-total-summary">
          <span>Grand Total:</span>
          <span id="cart-total-price" class="cart-total-price">₹0</span>
        </div>
        
        <form id="cart-checkout-form" class="order-form" style="padding: 0 16px 16px;">
          <button type="submit" class="order-btn" style="background:#10b981; box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4); width: 100%; margin: 10px 0 0 0;">
            <i class="fab fa-whatsapp"></i> Place Order via WhatsApp
          </button>
        </form>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-section">
        <h3>Amargeet's Arena</h3>
        <p>Delicious food for pickup or delivered to your doorstep</p>
      </div>
      <div class="footer-section">
        <h4>Contact Us</h4>
        <p><i class="fas fa-phone"></i> +91 78994 17495</p>
        <p><i class="fas fa-envelope"></i> amargeetsarena@gmail.com</p>
      </div>
      <div class="footer-section">
        <h4>Follow Us</h4>
        <div class="social-links">
          <a href="https://www.instagram.com/amargeetsarena/" aria-label="Instagram" target="_blank"><i class="fab fa-instagram"></i></a>
          <a href="https://youtube.com/@amargeetsarena" aria-label="YouTube" target="_blank"><i class="fab fa-youtube"></i></a>
          <a href="https://wa.me/917899417495?text=Hi!%20I%27m%20interested%20in%20Amargeet%27s%20Arena.%20Can%20you%20tell%20me%20more%20about%20your%20delicious%20food%20options%3F" aria-label="WhatsApp" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2026 Amargeet's Arena. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/menu.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
